<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/culturama-favico.png">
    <link rel="stylesheet" href="estilo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <img src="img/logo-culturama.png" alt="Logo da Culturama" width="200">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>

            <!-- DADOS PESSOAIS -->
             <legend>Dados Pesoais</legend>
            <label for="name">Nome</label>
            <input id="name" type="text" name="userName" required>
            <br>
            <label for="age">Idade</label>
            <input id="age" type="number" name="userAge" min="12" max="100" required>
            <br>
            <label for="birthDate">Data de nascimento</label>
            <input id="birthDate" type="date" name="userbirthDate">
            <br>
            <label for="mail">Email</label>
            <input id="mail" type="email" name="userEmail" required>
            <br>
            <label for="phoneNumber">Telefone</label>
            <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + numero sem espaços ou hífen">
            <br>
            <label for="image">Upload de foto</label>
            <input id="image" type="file" accept="image/*" name="userImage">
            <br>
            </fieldset>
            <br>
        </form>
    </section>
    
    <br>
    
    <section>
        <form action="" method="get">
            <fieldset>

            <!-- hábitos -->
            <legend>Hábitos</legend>
            <p>Redes sociais</p>
            <input id="instagram" type="checkbox" name="social" value="Instagram">
            <label for="instagram">Instagram</label>
            <br>
            <input id="facebook" type="checkbox" name="social" value="Facebook">
            <label for="facebook">Facebook</label>
            <br>
            <input id="twitter" type="checkbox" name="social" value="Twitter">
            <label for="twitter">Twitter</label>
            <br>
            <input id="linkedin" type="checkbox" name="social" value="Linkedin   ">
            <label for="linkedin">Linkedin</label>
            <br><br>

            <label for="musicStyle">Estilo musical:</label>
            <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
            <datalist id="styleTypes">
                <option value="Rock">
                <option value="Pop">
                <option value="Sertanejo">
                <option value="Funk">
                <option value="MPB">
                <option value="Eletrônica">
            </datalist>
            <br><br>
            <label for="favoriteColor">Cor favorita:</label>
            <input type="color" name="userFavoriteColor" id="color">

            </fieldset>
            <br> 

        </form>
    </section>
    <br>

    <section>
        <form action="" method="get">
            <fieldset>

            <!-- Opiniões -->
            <legend>Opiniões</legend>
            <p>Gênero de filme favorito:</p>
            <input id="action" type="radio" name="movieGenre" value="Ação">
            <label for="action">Ação</label>
            <br>
            <input id="comedy" type="radio" name="movieGenre" value="Comédia">
            <label for="comedy">Comédia</label>
            <br>
            <input id="drama" type="radio" name="movieGenre" value="Drama">
            <label for="drama">Drama</label>
            <br>
            <input id="horror" type="radio" name="movieGenre" value="Terror">
            <label for="horror">Terror</label>
            <br><br>

            <label for="satisfaction">Nível de satisfação com a cultura pop:</label>
            <input id="satisfaction" type="range" name="userSatisfaction" min="0" max="10">

            </fieldset>
            <br>
        </form>
    </section>

    <section>
        <form action="" method="get">
            <fieldset>

            <!-- Comentários -->
            <legend>Comentários</legend>
            <p>O que você acha da qualidade do nosso serviço?</p>
            <input id="otimo" type="radio" name="serviceQuality" value="otimo">
            <label for="otimo">Ótimo</label>

            <input id="boa" type="radio" name="serviceQuality" value="boa">
            <label for="boa">Boa</label>

            <input id="regular" type="radio" name="serviceQuality" value="regular">
            <label for="regular">Regular</label>

            <input id="ruim" type="radio" name="serviceQuality" value="Ruim">
            <label for="ruim">Ruim</label>
            <br><br>
            <label for="comments">Deixe seus comentários ou sugestões:</label>
            <br>
            <textarea id="comments" name="userComments" rows="4" cols="50" placeholder="Escreva aqui..."></textarea>
            </fieldset>
            <br>

        <fieldset>
            <legend>Confirmações</legend>
            <input type="checkbox" id="userLgpdTerm" name="userLgpd" value="accepted" required>
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label><br>

            <input type="checkbox" id="getResults" name="userGetResults" value="accepted">
            <label for="getResults">Eu aceito receber os resultados da pesquisa</label><br>

        </fieldset>

            <br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </section>

</body>
</html>
